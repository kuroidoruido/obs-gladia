<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gladia - Transcription</title>
    <style>
      @font-face {
        font-family: 'Luciole';
        src: url('/assets/Luciole/Luciole-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: 'Luciole';
        src: url('/assets/Luciole/Luciole-Bold.ttf') format('truetype');
        font-weight: bold;
        font-style: normal;
      }

      @font-face {
        font-family: 'Luciole';
        src: url('/assets/Luciole/Luciole-Regular-Italic.ttf') format('truetype');
        font-weight: normal;
        font-style: italic;
      }

      @font-face {
        font-family: 'Luciole';
        src: url('/assets/Luciole/Luciole-Bold-Italic.ttf') format('truetype');
        font-weight: bold;
        font-style: italic;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        background: #00FF00;
      }

      #transcript {
        color: #FFFFFF;
        padding: 1rem 1.5rem;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        max-width: 90vw;
        word-wrap: break-word;
        font-family: 'Luciole', Arial, sans-serif;
        letter-spacing: 0.05em;
        line-height: 1.4;
        text-shadow:
          -1px -1px 0 #000000,
          1px -1px 0 #000000,
          -1px 1px 0 #000000,
          1px 1px 0 #000000,
          -2px 0 0 #000000,
          2px 0 0 #000000,
          0 -2px 0 #000000,
          0 2px 0 #000000;
      }
    </style>
  </head>
  <body>
    <div id="transcript">Waiting for transcription...</div>

    <script>
      const transcriptEl = document.querySelector('#transcript');
      let messageCount = 0;

      function setTranscriptText(text) {
        messageCount += 1;
        document.title = `Gladia (${messageCount})`;
        transcriptEl.textContent = text;
      }

      function connect() {
        const socket = new WebSocket('ws://localhost:8080');

        socket.addEventListener('open', () => {
          transcriptEl.textContent = '';
        });

        socket.addEventListener('message', (event) => {
          try {
            const payload = JSON.parse(event.data);
            const text =
              payload?.text ||
              payload?.transcription ||
              payload?.data?.utterance?.text ||
              payload?.utterance?.text;

            if (typeof text === 'string' && text.trim() !== '') {
              setTranscriptText(text);
            }
          } catch (err) {
            console.error('Parse error:', err);
          }
        });

        socket.addEventListener('close', () => {
          setTimeout(connect, 2000);
        });

        socket.addEventListener('error', (event) => {
          console.error('WebSocket error', event);
        });
      }

      connect();
    </script>
  </body>
</html>
