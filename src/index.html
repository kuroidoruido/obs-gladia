<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gladia - Transcription</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        color: #f7f7f7;
        font-family: system-ui, sans-serif;
      }

      #app {
        width: min(960px, 90vw);
        padding: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: rgba(20, 20, 20, 0.95);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.75rem;
        letter-spacing: -0.02em;
      }

      #status {
        margin: 0 0 1.5rem;
        color: #9e9e9e;
      }

      #transcript {
        min-height: 8rem;
        padding: 1rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        white-space: pre-wrap;
        line-height: 1.6;
      }

      .message {
        margin-bottom: 0.75rem;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .message:last-child {
        margin-bottom: 0;
      }

      .error {
        color: #ff8a80;
      }

      .warning {
        color: #ffd180;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 id="title">Gladia WebSocket (0)</h1>
      <p id="status">Connecting to local transcription server...</p>
      <div id="transcript">Waiting for transcription...</div>
    </div>

    <script>
      const titleEl = document.querySelector('#title');
      const statusEl = document.querySelector('#status');
      const transcriptEl = document.querySelector('#transcript');
      let messageCount = 0;

      function updateTitle() {
        titleEl.textContent = `Gladia WebSocket (${messageCount})`;
      }

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = type || '';
      }

      function setTranscriptText(text) {
        messageCount += 1;
        updateTitle();
        transcriptEl.textContent = text;
      }

      function connect() {
        const socket = new WebSocket('ws://localhost:8080');

        socket.addEventListener('open', () => {
          setStatus('Connected to audio-capture-wav.ts WebSocket', '');
          transcriptEl.textContent = 'Connected. Waiting for transcription...';
        });

        socket.addEventListener('message', (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload && typeof payload.text === 'string') {
              setTranscriptText(payload.text);
            } else {
              console.warn('Received unknown message:', event.data);
            }
          } catch (err) {
            console.warn('Received non-JSON message, ignoring:', event.data);
          }
        });

        socket.addEventListener('close', () => {
          setStatus('Connection closed. Reconnecting in 2 seconds...', 'warning');
          setTimeout(connect, 2000);
        });

        socket.addEventListener('error', (event) => {
          setStatus('WebSocket error. Check audio-capture-wav.ts server.', 'error');
          console.error('WebSocket error', event);
        });
      }

      connect();
    </script>
  </body>
</html>
